<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Firestore Query Test</title>
  <style>
    /* Simple web1.0-ish styling */
    body {
      font-family: "Times New Roman", Times, serif;
      margin: 16px;
      background: #fff;
      color: #000;
    }
    h1, h2 { margin: 0 0 12px 0; }
    .box {
      border: 1px solid #000;
      padding: 10px;
      margin-bottom: 12px;
    }
    label { display: inline-block; min-width: 140px; }
    input, button, select {
      font-family: inherit;
      font-size: 14px;
      margin: 2px 0;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #000;
      padding: 4px;
      vertical-align: top;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      font-size: 13px;
    }
    th { background: #eee; }
    .muted { color: #333; font-size: 13px; }
    .row { margin-bottom: 6px; }
    #error { color: #b00000; white-space: pre-wrap; }
    #status { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Firestore Query Test</h1>

  <div class="box">
    <h2>1) Login</h2>
    <div class="row">
      <label for="email">Email:</label>
      <input id="email" type="email" size="40" autocomplete="username" />
    </div>
    <div class="row">
      <label for="password">Password:</label>
      <input id="password" type="password" size="40" autocomplete="current-password" />
    </div>
    <div class="row">
      <button id="loginBtn">Log In</button>
      <button id="logoutBtn" disabled>Log Out</button>
    </div>
    <div class="row muted">Signed in user: <span id="userDisplay">(none)</span></div>
  </div>

  <div class="box">
    <h2>2) Query Collection</h2>
    <div class="row">
      <label for="collectionName">Collection:</label>
      <select id="collectionName">
        <option value="users" selected>users</option>
        <option value="connections">connections</option>
        <option value="invitations">invitations</option>
        <option value="conversations">conversations</option>
        <option value="messages">messages</option>
        <option value="bannedUsers">bannedUsers</option>
      </select>
    </div>
    <div class="row">
      <label for="batchSize">Batch size:</label>
      <input id="batchSize" type="number" min="1" value="50" />
      <span class="muted">(default 50)</span>
    </div>
    <div class="row">
      <button id="startBtn" disabled>Load First Batch</button>
      <button id="moreBtn" disabled>More</button>
      <button id="resetBtn">Reset Table</button>
    </div>
    <div id="status" class="muted">Status: idle</div>
    <div id="error"></div>
  </div>

  <div class="box">
    <h2>Results</h2>
    <div class="muted">All discovered fields are shown as columns. Nested objects/arrays are JSON strings.</div>
    <br />
    <table id="resultsTable">
      <thead id="resultsHead"></thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>

  <!-- Firebase v10 modular SDK from CDN -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      limit,
      startAfter,
      getDocs,
      documentId
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    /********************************************************************
     * TODO: REPLACE with your actual web Firebase config
     ********************************************************************/
    const firebaseConfig = {
      apiKey: "AIzaSyDamj1ac1wsOX-sGTZC6ocmqiEae9xlCBE",
      authDomain: "alexnametag-faabd.firebaseapp.com",
      projectId: "alexnametag-faabd",
      storageBucket: "alexnametag-faabd.appspot.com",
      messagingSenderId: "675164961834",
      appId: "NOT_AVAILABLE"
    };

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM refs
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userDisplay = document.getElementById("userDisplay");

    const collectionNameEl = document.getElementById("collectionName");
    const batchSizeEl = document.getElementById("batchSize");
    const startBtn = document.getElementById("startBtn");
    const moreBtn = document.getElementById("moreBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");

    const headEl = document.getElementById("resultsHead");
    const bodyEl = document.getElementById("resultsBody");

    // Query state
    let lastVisibleDoc = null;
    let hasMore = false;
    let currentCollection = null;
    let currentBatchSize = 50;

    // Table state
    const allRows = [];               // array of row objects
    const allColumns = new Set(["__id"]); // always include doc id

    // Inferred location state
    const INFERRED_LOCATION_COL = "Inferred Location";
    let tableGeneration = 0;          // incremented on reset; guards stale async callbacks
    const inferredLocationCache = new Map(); // keyed by "lat,lon" -> Promise<{label,title}>

    // --- Coordinate helpers ---
    function normalizeCoordinate(v) {
      if (typeof v === "number") return Number.isFinite(v) ? v : null;
      if (typeof v === "string" && v.trim() !== "") {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }
      return null;
    }

    function isValidCoordinatePair(lat, lon) {
      return lat !== null && lon !== null &&
        lat >= -90 && lat <= 90 &&
        lon >= -180 && lon <= 180;
    }

    function makeGoogleMapsUrl(lat, lon) {
      return `https://www.google.com/maps?q=${encodeURIComponent(`${lat},${lon}`)}`;
    }

    // --- Reverse geocoding via Nominatim ---
    let nominatimQueueTail = Promise.resolve();

    function delayMs(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function enqueueNominatimRequest(fn) {
      const resultPromise = nominatimQueueTail.then(fn);
      // After each request settles, enforce a 1-second gap before the next one
      nominatimQueueTail = resultPromise
        .then(() => delayMs(1000), () => delayMs(1000));
      return resultPromise;
    }

    async function reverseGeocodeLatLon(lat, lon) {
      const key = `${lat},${lon}`;
      if (inferredLocationCache.has(key)) return inferredLocationCache.get(key);

      const promise = enqueueNominatimRequest(async () => {
        const url =
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2` +
          `&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}` +
          `&zoom=14&addressdetails=1`;
        const res = await fetch(url, {
          headers: {
            "Accept": "application/json",
            "User-Agent": "NameTag-QueryTest/1.0"
          }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const a = data.address || {};
        const label =
          a.attraction || a.tourism || a.building ||
          a.neighbourhood || a.suburb || a.hamlet ||
          a.village || a.town || a.city ||
          a.county || a.state ||
          data.name || data.display_name ||
          `${lat}, ${lon}`;
        return { label, title: data.display_name || label };
      });

      inferredLocationCache.set(key, promise);
      return promise;
    }

    // --- Inferred location cell rendering ---
    function renderInferredLocationCell(td, row) {
      td.textContent = "";
      const info = row[INFERRED_LOCATION_COL];
      if (info && typeof info === "object" && info.href) {
        const a = document.createElement("a");
        a.href = info.href;
        a.textContent = info.label;
        if (info.title) a.title = info.title;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        td.appendChild(a);
      } else if (typeof info === "string") {
        td.textContent = info;
      }
    }

    function updateInferredLocationCell(rowIndex) {
      const tr = bodyEl.querySelector(`tr[data-row-index="${rowIndex}"]`);
      if (!tr) return;
      const columns = Array.from(allColumns);
      const colIdx = columns.indexOf(INFERRED_LOCATION_COL);
      if (colIdx === -1) return;
      const td = tr.cells[colIdx];
      if (td) renderInferredLocationCell(td, allRows[rowIndex]);
    }

    function setStatus(msg) {
      statusEl.textContent = "Status: " + msg;
    }

    function setError(msg) {
      errorEl.textContent = msg || "";
    }

    function safeCellValue(v) {
      if (v === null) return "null";
      if (v === undefined) return "";
      if (typeof v === "object") {
        try { return JSON.stringify(v); } catch { return "[object]"; }
      }
      return String(v);
    }

    function rebuildTable() {
      const columns = Array.from(allColumns);

      // Header
      headEl.innerHTML = "";
      const hr = document.createElement("tr");
      columns.forEach(c => {
        const th = document.createElement("th");
        th.textContent = c;
        hr.appendChild(th);
      });
      headEl.appendChild(hr);

      // Body
      bodyEl.innerHTML = "";
      for (let i = 0; i < allRows.length; i++) {
        const row = allRows[i];
        const tr = document.createElement("tr");
        tr.dataset.rowIndex = i;
        for (const c of columns) {
          const td = document.createElement("td");
          if (c === INFERRED_LOCATION_COL) {
            renderInferredLocationCell(td, row);
          } else {
            td.textContent = safeCellValue(row[c]);
          }
          tr.appendChild(td);
        }
        bodyEl.appendChild(tr);
      }
    }

    function resetStateAndTable() {
      tableGeneration++;
      lastVisibleDoc = null;
      hasMore = false;
      currentCollection = null;
      allRows.length = 0;
      allColumns.clear();
      allColumns.add("__id");
      rebuildTable();
      moreBtn.disabled = true;
      setStatus("idle");
      setError("");
    }

    async function fetchBatch({ firstBatch }) {
      setError("");

      const colName = collectionNameEl.value.trim();
      const batch = Number(batchSizeEl.value) || 50;

      if (!colName) {
        setError("Please enter a collection name.");
        return;
      }
      if (batch < 1) {
        setError("Batch size must be >= 1.");
        return;
      }

      // On first batch, set active query settings
      if (firstBatch) {
        currentCollection = colName;
        currentBatchSize = batch;
        lastVisibleDoc = null;
        hasMore = false;
      } else {
        // enforce consistency across "More" clicks
        if (colName !== currentCollection) {
          setError("Collection name changed. Click 'Load First Batch' again.");
          return;
        }
      }

      try {
        setStatus(`loading ${firstBatch ? "first" : "next"} batch...`);

        const colRef = collection(db, currentCollection);

        // NOTE: ordering by documentId for stable pagination
        let q;
        if (lastVisibleDoc) {
          q = query(
            colRef,
            orderBy(documentId()),
            startAfter(lastVisibleDoc),
            limit(currentBatchSize)
          );
        } else {
          q = query(
            colRef,
            orderBy(documentId()),
            limit(currentBatchSize)
          );
        }

        const snap = await getDocs(q);

        if (snap.empty) {
          hasMore = false;
          moreBtn.disabled = true;
          setStatus(`done. no more results. total rows: ${allRows.length}`);
          return;
        }

        // Append rows
        const newRowsWithCoords = []; // { rowIndex, lat, lon } for rows with valid coordinates
        let hasNewCoords = false;
        snap.docs.forEach(docSnap => {
          const data = docSnap.data() || {};
          const row = { __id: docSnap.id, ...data };
          Object.keys(row).forEach(k => allColumns.add(k));
          const rowIndex = allRows.length;
          allRows.push(row);
          const lat = normalizeCoordinate(row.latitude);
          const lon = normalizeCoordinate(row.longitude);
          if (isValidCoordinatePair(lat, lon)) {
            hasNewCoords = true;
            row[INFERRED_LOCATION_COL] = "Looking up...";
            newRowsWithCoords.push({ rowIndex, lat, lon });
          }
        });

        // Add inferred location column (always after regular fields) when any row has coords
        if (hasNewCoords && !allColumns.has(INFERRED_LOCATION_COL)) {
          allColumns.add(INFERRED_LOCATION_COL);
        }

        rebuildTable();

        // Kick off async reverse geocoding for new rows that have valid coordinates
        const gen = tableGeneration;
        for (const { rowIndex, lat, lon } of newRowsWithCoords) {
          const row = allRows[rowIndex];
          reverseGeocodeLatLon(lat, lon).then(geo => {
            if (tableGeneration !== gen) return;
            row[INFERRED_LOCATION_COL] = {
              label: geo.label,
              href: makeGoogleMapsUrl(lat, lon),
              title: geo.title
            };
            updateInferredLocationCell(rowIndex);
          }).catch(() => {
            if (tableGeneration !== gen) return;
            row[INFERRED_LOCATION_COL] = {
              label: `${lat}, ${lon}`,
              href: makeGoogleMapsUrl(lat, lon),
              title: `${lat}, ${lon}`
            };
            updateInferredLocationCell(rowIndex);
          });
        }

        // Determine pagination state
        lastVisibleDoc = snap.docs[snap.docs.length - 1];
        hasMore = snap.size === currentBatchSize;
        moreBtn.disabled = !hasMore;

        setStatus(
          `loaded ${snap.size} records. total rows: ${allRows.length}. ` +
          (hasMore ? "more available." : "end reached.")
        );
      } catch (err) {
        console.error(err);
        setError("Query failed:\n" + (err?.message || String(err)));
        setStatus("error");
      }
    }

    // Auth handlers
    loginBtn.addEventListener("click", async () => {
      setError("");
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      if (!email || !password) {
        setError("Please enter email and password.");
        return;
      }

      try {
        setStatus("logging in...");
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        console.error(err);
        setError("Login failed:\n" + (err?.message || String(err)));
        setStatus("login failed");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (err) {
        console.error(err);
        setError("Logout failed:\n" + (err?.message || String(err)));
      }
    });

    onAuthStateChanged(auth, (user) => {
      const loggedIn = !!user;
      userDisplay.textContent = loggedIn ? `${user.email || user.uid}` : "(none)";
      loginBtn.disabled = loggedIn;
      logoutBtn.disabled = !loggedIn;
      startBtn.disabled = !loggedIn;
      moreBtn.disabled = !loggedIn || !hasMore;

      if (loggedIn) {
        setStatus("logged in");
      } else {
        resetStateAndTable();
        setStatus("logged out");
      }
    });

    // Query buttons
    startBtn.addEventListener("click", async () => {
      // start fresh for first batch
      tableGeneration++;
      allRows.length = 0;
      allColumns.clear();
      allColumns.add("__id");
      rebuildTable();
      await fetchBatch({ firstBatch: true });
    });

    moreBtn.addEventListener("click", async () => {
      await fetchBatch({ firstBatch: false });
    });

    resetBtn.addEventListener("click", () => {
      resetStateAndTable();
    });

    // Initial UI
    resetStateAndTable();
  </script>
</body>
</html>
